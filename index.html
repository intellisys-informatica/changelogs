<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelogs - Intellisys</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  <style>
    :root {
      --theme-color: #1565C0;
      --sidebar-width: 280px;
      --base-font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="app">Carregando...</div>
  <script>
    window.$docsify = {
      name: '📋 Changelogs',
      nameLink: '/',
      repo: 'https://github.com/intellisys-informatica/changelogs',
      loadSidebar: '_sidebar.md',
      loadNavbar: false,
      homepage: 'README.md',
      subMaxLevel: 2,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar...',
        noData: 'Nenhum resultado encontrado.',
        depth: 4,
        hideOtherSidebarContent: false,
        namespace: 'intellisys-changelogs'
      },
      plugins: []
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
</body>
</html>
