<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelogs - Intellisys</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css">
  <style>
    :root {
      --sidebar-width: 280px;
      --base-font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="app">Carregando...</div>
  <script>
    window.$docsify = {
      name: '📋 Changelogs',
      nameLink: '/',
      repo: 'https://github.com/intellisys-informatica/changelogs',
      loadSidebar: '_sidebar.md',
      loadNavbar: false,
      homepage: 'README.md',
      subMaxLevel: 2,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar...',
        noData: 'Nenhum resultado encontrado.',
        depth: 4,
        hideOtherSidebarContent: false,
        namespace: 'intellisys-changelogs'
      },
      darklightTheme: {
        defaultTheme: 'light',
        dark: {
          accent: '#4a9eff',
          background: '#1a1d23',
          textColor: '#c9d1d9',
          codeTextColor: '#e6edf3',
          codeBackgroundColor: '#161b22',
          borderColor: '#30363d',
          blockQuoteColor: '#8b949e',
          highlightColor: '#4a9eff',
          sidebarSublink: '#8b949e',
          codeTypeColor: '#79c0ff',
          toogleImage: 'url(//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/icons/sun.svg)'
        },
        light: {
          accent: '#1565C0',
          background: '#ffffff',
          textColor: '#24292f',
          codeTextColor: '#24292f',
          codeBackgroundColor: '#f6f8fa',
          borderColor: '#d0d7de',
          blockQuoteColor: '#57606a',
          highlightColor: '#1565C0',
          sidebarSublink: '#57606a',
          codeTypeColor: '#1565C0',
          toogleImage: 'url(//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/icons/moon.svg)'
        }
      },
      plugins: []
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
</body>
</html>
